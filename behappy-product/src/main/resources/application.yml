server:
  port: 30001
spring:
  application:
    name: @project.artifactId@
  datasource:
    # druid-dev.yml
    driver-class-name: com.mysql.cj.jdbc.Driver
    password: ${behappy.mysql.password:root}
    username: ${behappy.mysql.username:root}
    url: jdbc:mysql://${behappy.mysql.host:192.168.56.100:3306}/${behappy.mysql.db.hosp:gulimall_pms}?allowMultiQueries=true&useSSL=false&useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true
# mybaits-dev.yml配置
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  global-config:
    banner: false
    db-config:
      table-underline: true
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    # 开启控制台sql日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
